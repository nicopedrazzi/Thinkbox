<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThinkBox</title>
  </head>
  <body>
    <main class="window">
      <section class="content content--compact">
        <section class="input-card">
          <div class="input-wrap">
            <div class="spark" aria-hidden="true">✎</div>
            <div class="input-main">
              <textarea id="note" placeholder="What’s on your mind right now?"></textarea>
              <div class="input-footer">
                <span class="hint">Press Enter to save quickly</span>
                <button id="send-btn" class="btn btn-primary" type="button">Save note</button>
              </div>
            </div>
          </div>
        </section>

        <section class="quick-actions" aria-label="View controls">
          <button id="toggle-notes-btn" class="btn btn-soft" type="button" aria-expanded="false">
            Show notes
          </button>
          <button
            id="toggle-reminders-btn"
            class="btn btn-soft"
            type="button"
            aria-expanded="false"
          >
            Show reminders
          </button>
          <button id="gen-btn" class="btn btn-accent" type="button">Generate reminders</button>
          <button id="open-todos-btn" class="btn btn-soft" type="button">Open todo list</button>
        </section>

        <section id="notes-panel" class="panel" hidden>
          <div class="section-title">
            <h2>Current notes</h2>
            <span id="notes-count">0 captured</span>
          </div>
          <section id="notes-list" class="notes"></section>
        </section>

        <section id="reminders-panel" class="panel" hidden>
          <div class="section-title">
            <h2>Generated reminders</h2>
            <span>Preview</span>
          </div>
          <section id="reminders-list" class="reminders"></section>
        </section>
      </section>
    </main>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
